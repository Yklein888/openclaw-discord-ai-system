router_settings:
  routing_strategy: least-busy
  cooldown_time: 60
  num_retries: 2
  allowed_fails: 1

litellm_settings:
  drop_params: true
  request_timeout: 30
  max_tokens: 4096

general_settings:
  master_key: sk-litellm-master-2026
  port: 4000



  # ============================================
  # NEW MODELS — OpenClaw v2.0
  # ============================================

  # DeepSeek R1 (via OpenRouter — reasoning model)
  - model_name: deepseek-r1
    litellm_params:
      model: openrouter/deepseek/deepseek-r1
      api_key: YOUR_OPENROUTER_KEY_HERE
      rpm: 20

  # Qwen3.6 (1M context via OpenRouter)
  - model_name: qwen-1m
    litellm_params:
      model: openrouter/qwen/qwen3-235b-a22b
      api_key: YOUR_OPENROUTER_KEY_HERE
      rpm: 20

  # Gemini 2.5 Flash (via Google)
  - model_name: gemini-2.5-flash
    litellm_params:
      model: gemini/gemini-2.5-flash-preview-04-17
      api_key: os.environ/GEMINI_KEY_1  # set in .env
